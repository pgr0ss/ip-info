<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Current IP Info</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --text: #e8eaed;
      --muted: #9aa0aa;
      --online: #1f8f4e;
      --offline: #c0392b;
      --checking: #6b7280;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    main {
      width: 100%;
      max-width: 480px;
      padding: 1.25rem 0 2rem;
    }
    #status {
      border-radius: 14px;
      padding: 1.5rem 1rem;
      text-align: center;
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      transition: background-color 0.2s ease;
    }
    #status.online { background: var(--online); }
    #status.offline { background: var(--offline); }
    #status.checking { background: var(--checking); }
    #status .sub {
      display: block;
      margin-top: 0.35rem;
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.9;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-top: 1rem;
    }
    .ip {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 2rem;
      font-weight: 700;
      word-break: break-all;
      text-align: center;
    }
    .label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      text-align: center;
    }
    dl {
      margin: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.4rem 0.9rem;
    }
    dt {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: capitalize;
    }
    dd {
      margin: 0;
      font-size: 0.9rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      word-break: break-word;
    }
    .times {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .times .row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    .times .row span:first-child { color: var(--muted); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <div id="status" class="checking">
      CHECKING…
      <span class="sub" id="statusSub"></span>
    </div>

    <div class="card">
      <div class="label">Current IP</div>
      <div class="ip" id="ip">—</div>
    </div>

    <div class="card">
      <div class="label">Network details</div>
      <dl id="details"><dd class="muted">No data yet.</dd></dl>
    </div>

    <div class="card times">
      <div class="row"><span>Last success</span><span id="lastSuccess">—</span></div>
      <div class="row"><span>Last attempt</span><span id="lastAttempt">—</span></div>
    </div>
  </main>

  <script>
    "use strict";

    const ENDPOINT = "https://ipinfo.io/json";
    const POLL_MS = 5000;
    const TICK_MS = 1000;
    const TIMEOUT_MS = 4000;
    const STALE_AFTER = 12000;

    const DETAIL_ORDER = [
      "hostname", "city", "region", "country",
      "org", "loc", "postal", "timezone",
    ];
    const DETAIL_SKIP = new Set(["ip", "readme"]);

    let lastData = null;
    let lastSuccessAt = null;
    let lastAttemptAt = null;
    let lastAttemptOk = null;
    let inFlight = false;

    const el = {
      status: document.getElementById("status"),
      statusSub: document.getElementById("statusSub"),
      ip: document.getElementById("ip"),
      details: document.getElementById("details"),
      lastSuccess: document.getElementById("lastSuccess"),
      lastAttempt: document.getElementById("lastAttempt"),
    };

    function relAge(from, now) {
      let s = Math.max(0, Math.round((now - from) / 1000));
      if (s < 60) return s + "s ago";
      const m = Math.floor(s / 60);
      s = s % 60;
      if (m < 60) return m + "m " + s + "s ago";
      const h = Math.floor(m / 60);
      return h + "h " + (m % 60) + "m ago";
    }

    function relDuration(from, now) {
      let s = Math.max(0, Math.round((now - from) / 1000));
      if (s < 60) return s + "s";
      const m = Math.floor(s / 60);
      s = s % 60;
      if (m < 60) return m + "m " + s + "s";
      const h = Math.floor(m / 60);
      return h + "h " + (m % 60) + "m";
    }

    function clockTime(d) {
      return d.toLocaleTimeString([], { hour12: false });
    }

    function deriveStatus(now) {
      if (lastAttemptOk === null) return "checking";
      if (lastAttemptOk && lastSuccessAt && now - lastSuccessAt <= STALE_AFTER) {
        return "online";
      }
      return "offline";
    }

    function renderDetails() {
      if (!lastData) {
        el.details.innerHTML = '<dd class="muted">No data yet.</dd>';
        return;
      }
      const keys = [
        ...DETAIL_ORDER.filter((k) => k in lastData),
        ...Object.keys(lastData).filter(
          (k) => !DETAIL_SKIP.has(k) && !DETAIL_ORDER.includes(k)
        ),
      ];
      const frag = document.createDocumentFragment();
      for (const k of keys) {
        const v = lastData[k];
        if (v === null || v === undefined || v === "") continue;
        const dt = document.createElement("dt");
        dt.textContent = k;
        const dd = document.createElement("dd");
        dd.textContent = String(v);
        frag.append(dt, dd);
      }
      el.details.replaceChildren(frag);
    }

    function render() {
      const now = Date.now();
      const status = deriveStatus(now);

      el.status.className = status;
      if (status === "online") {
        el.status.firstChild.nodeValue = "ONLINE";
        el.statusSub.textContent = "confirmed " + relAge(lastSuccessAt, now);
      } else if (status === "offline") {
        el.status.firstChild.nodeValue = "OFFLINE";
        el.statusSub.textContent = lastSuccessAt
          ? "no data for " + relDuration(lastSuccessAt, now)
          : "never connected";
      } else {
        el.status.firstChild.nodeValue = "CHECKING…";
        el.statusSub.textContent = "";
      }

      el.ip.textContent = lastData && lastData.ip ? lastData.ip : "—";

      el.lastSuccess.textContent = lastSuccessAt
        ? clockTime(new Date(lastSuccessAt)) + " (" + relAge(lastSuccessAt, now) + ")"
        : "—";
      el.lastAttempt.textContent = lastAttemptAt
        ? clockTime(new Date(lastAttemptAt)) +
          " (" + (lastAttemptOk ? "ok" : "failed") + ")"
        : "—";
    }

    async function fetchIp() {
      if (inFlight) return;
      inFlight = true;
      lastAttemptAt = Date.now();
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
      try {
        const res = await fetch(ENDPOINT, {
          signal: ctrl.signal,
          cache: "no-store",
          headers: { Accept: "application/json" },
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        lastData = data;
        lastSuccessAt = Date.now();
        lastAttemptOk = true;
        renderDetails();
      } catch (e) {
        lastAttemptOk = false;
      } finally {
        clearTimeout(timer);
        inFlight = false;
        render();
      }
    }

    setInterval(fetchIp, POLL_MS);
    setInterval(render, TICK_MS);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") fetchIp();
    });

    render();
    fetchIp();
  </script>
</body>
</html>
